<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      @keyframes scanLine { 0% { transform: translateY(-80px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(80px); opacity: 0; } }
      @keyframes pulseGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
      @keyframes fadeInText { 0% { opacity: 0; } 50% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes dashOffset { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: 0; } }
      .scan-line { animation: scanLine 3s ease-in-out infinite; }
      .pulse-ring { animation: pulseGlow 2s ease-in-out infinite; }
      .fade-text { animation: fadeInText 3s ease-in-out forwards; }
      .draw-path { stroke-dasharray: 1000; animation: dashOffset 4s ease-in-out forwards; }
    </style>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E63946" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="fpClip"><circle cx="100" cy="100" r="55"/></clipPath>
  </defs>
  <rect width="400" height="200" fill="#0A0A0A" rx="8"/>
  <rect x="2" y="2" width="396" height="196" fill="none" stroke="#E63946" stroke-width="1" stroke-opacity="0.3" rx="7"/>
  <g transform="translate(0, 0)">
    <circle cx="100" cy="100" r="65" fill="none" stroke="#E63946" stroke-width="1" stroke-opacity="0.2" class="pulse-ring"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="#E63946" stroke-width="0.5" stroke-opacity="0.15"/>
    <path d="M50,55 L50,45 L60,45" fill="none" stroke="#E63946" stroke-width="1.5" stroke-opacity="0.6"/>
    <path d="M140,45 L150,45 L150,55" fill="none" stroke="#E63946" stroke-width="1.5" stroke-opacity="0.6"/>
    <path d="M50,145 L50,155 L60,155" fill="none" stroke="#E63946" stroke-width="1.5" stroke-opacity="0.6"/>
    <path d="M140,155 L150,155 L150,145" fill="none" stroke="#E63946" stroke-width="1.5" stroke-opacity="0.6"/>
    <g clip-path="url(#fpClip)" filter="url(#glow)">
      <path d="M100,145 C65,145 55,120 55,100 C55,75 70,55 100,55" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path"/>
      <path d="M100,140 C70,140 60,118 60,100 C60,78 73,60 100,60" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path" style="animation-delay: 0.2s"/>
      <path d="M100,135 C75,135 65,116 65,100 C65,80 77,65 100,65" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path" style="animation-delay: 0.4s"/>
      <path d="M100,130 C80,130 70,114 70,100 C70,83 80,70 100,70" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path" style="animation-delay: 0.6s"/>
      <path d="M100,125 C83,125 75,112 75,100 C75,86 83,75 100,75" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path" style="animation-delay: 0.8s"/>
      <path d="M100,120 C87,120 80,110 80,100 C80,89 87,80 100,80" fill="none" stroke="#E63946" stroke-width="1" stroke-opacity="0.4" class="draw-path" style="animation-delay: 1s"/>
      <path d="M100,115 C90,115 85,108 85,100 C85,92 90,85 100,85" fill="none" stroke="#E63946" stroke-width="1" stroke-opacity="0.4" class="draw-path" style="animation-delay: 1.2s"/>
      <path d="M100,145 C135,145 145,120 145,100 C145,75 130,55 100,55" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path" style="animation-delay: 0.1s"/>
      <path d="M100,140 C130,140 140,118 140,100 C140,78 127,60 100,60" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path" style="animation-delay: 0.3s"/>
      <path d="M100,135 C125,135 135,116 135,100 C135,80 123,65 100,65" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path" style="animation-delay: 0.5s"/>
      <path d="M100,130 C120,130 130,114 130,100 C130,83 120,70 100,70" fill="none" stroke="#E63946" stroke-width="1.2" stroke-opacity="0.5" class="draw-path" style="animation-delay: 0.7s"/>
      <path d="M100,125 C117,125 125,112 125,100 C125,86 117,75 100,75" fill="none" stroke="#E63946" stroke-width="1" stroke-opacity="0.4" class="draw-path" style="animation-delay: 0.9s"/>
      <path d="M100,120 C113,120 120,110 120,100 C120,89 113,80 100,80" fill="none" stroke="#E63946" stroke-width="1" stroke-opacity="0.4" class="draw-path" style="animation-delay: 1.1s"/>
      <path d="M100,115 C110,115 115,108 115,100 C115,92 110,85 100,85" fill="none" stroke="#E63946" stroke-width="1" stroke-opacity="0.3" class="draw-path" style="animation-delay: 1.3s"/>
    </g>
    <g class="scan-line">
      <rect x="45" y="96" width="110" height="8" fill="url(#scanGrad)"/>
      <line x1="45" y1="100" x2="155" y2="100" stroke="#E63946" stroke-width="1" stroke-opacity="0.9"/>
    </g>
  </g>
  <g class="fade-text">
    <text x="210" y="60" fill="#E63946" font-family="'Courier New', monospace" font-size="9" font-weight="bold" letter-spacing="3" opacity="0.6">&#9670; BIOMETRIC GATEWAY &#9670;</text>
    <text x="210" y="85" fill="#FCFAF9" font-family="'Courier New', monospace" font-size="11" font-weight="bold" letter-spacing="2">ACCESS PROTOCOL</text>
    <text x="210" y="105" fill="#E63946" font-family="'Courier New', monospace" font-size="14" font-weight="bold" letter-spacing="3" filter="url(#glow)">JPMC-SENTINEL-X</text>
    <line x1="210" y1="115" x2="380" y2="115" stroke="#E63946" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="210" y="133" fill="#FCFAF9" font-family="'Courier New', monospace" font-size="8" letter-spacing="1" opacity="0.5">CLASSIFICATION: TOP SECRET//NOFORN</text>
    <text x="210" y="148" fill="#10B981" font-family="'Courier New', monospace" font-size="8" letter-spacing="1" opacity="0.7">STATUS: &#9679; ACTIVE  |  AUTH: LEVEL-5</text>
    <text x="210" y="163" fill="#FCFAF9" font-family="'Courier New', monospace" font-size="7" letter-spacing="1" opacity="0.35">KINEXYS FORENSIC OPERATIONS DIVISION</text>
  </g>
  <rect x="210" y="172" width="6" height="10" fill="#E63946" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>